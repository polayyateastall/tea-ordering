<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polayya Tea Stall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0f0c09;
    --card:#1a1510;
    --gold:#c58b47;
    --gold-light:#e4c08f;
    --cream:#f2eadf;
    --border:#3a2a18;
    --green:#2f9e44;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--cream);
    min-height:100vh;
    padding-bottom:100px;
}

.header{
    background:#0b0907;
    text-align:center;
    padding:20px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:40px;
}

.title{
    font-size:32px;
    font-weight:700;
    letter-spacing:2px;
}

.subtitle{
    color:var(--gold);
    letter-spacing:5px;
    font-size:16px;
}

.container{
    max-width:600px;
    margin:auto;
    padding:15px;
}

.table-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:15px;
    text-align:center;
    margin-bottom:20px;
}

#tableNo{
    color:var(--gold-light);
    font-size:24px;
    font-weight:700;
}

.section-title{
    text-align:center;
    color:var(--gold);
    margin-bottom:15px;
}

.item{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.item-info{
    display:flex;
    flex-direction:column;
}

.item-name{
    font-size:18px;
    font-weight:600;
}

.item-price{
    color:var(--gold-light);
    margin-top:4px;
}

.qty{
    display:flex;
    align-items:center;
    gap:10px;
}

.qty button{
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    background:var(--gold);
    color:white;
    font-size:20px;
    cursor:pointer;
}

.qty button:active{
    transform:scale(.95);
}

.qty span{
    min-width:25px;
    text-align:center;
    font-size:18px;
    font-weight:600;
}

.bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#15110d;
    border-top:1px solid var(--border);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total-label{
    font-size:13px;
    color:#aaa;
}

.total-value{
    color:var(--gold-light);
    font-size:24px;
    font-weight:bold;
}

#checkout{
    background:var(--green);
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.loading{
    text-align:center;
    padding:30px;
    color:var(--gold);
}

.footer{
    text-align:center;
    margin-top:20px;
    color:var(--gold);
    font-style:italic;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">☕</div>
    <div class="title">POLAYYA TEA STALL</div>
    <div class="subtitle">ORDER MENU</div>
</div>

<div class="container">

    <div class="table-card">
        <small>SERVING</small>
        <div id="tableNo"></div>
    </div>

    <h3 class="section-title">Our Menu</h3>

    <div id="menu">
        <div class="loading">Loading menu...</div>
    </div>

    <div class="footer">
        Fresh Tea Served With Love ☕
    </div>

</div>

<div class="bottom-bar">

    <div>
        <div class="total-label">
            Total Amount
        </div>
        <div class="total-value">
            ₹<span id="total">0</span>
        </div>
    </div>

    <button id="checkout" onclick="placeOrder()">
        Place Order
    </button>

</div>

<script>

const stockURL =
"https://script.google.com/macros/s/AKfycbyQsbbVeX8TRWIjsE5JXpb5eU7xlVBF2Duy1YZFRF60KlxIwRGBj2aBzFo2Mh6AzTgv/exec?action=stock";

const orderURL =
"https://script.google.com/macros/s/AKfycbyQsbbVeX8TRWIjsE5JXpb5eU7xlVBF2Duy1YZFRF60KlxIwRGBj2aBzFo2Mh6AzTgv/exec";

const whatsappNumber = "918121944510";

let menu = [];
let stockMap = {};
const cart = {};

const params =
new URLSearchParams(window.location.search);

const table =
params.get("table") || "Unknown";

document.getElementById("tableNo").innerText =
"Table " + table;

async function loadMenu(){

    try{

        const response =
        await fetch(stockURL);

        const data =
        await response.json();

        menu = data.filter(item =>
            String(item.available).toLowerCase() === "yes"
            && Number(item.qty) > 0
        );

        const menuDiv =
        document.getElementById("menu");

        menuDiv.innerHTML = "";

        menu.forEach(item => {

            cart[item.item] = 0;

            stockMap[item.item] =
            Number(item.qty);

            const id =
            item.item.replace(/\s+/g,"_");

            const div =
            document.createElement("div");

            div.className = "item";

            div.innerHTML = `
                <div class="item-info">
                    <div class="item-name">
                        ${item.item}
                    </div>
                    <div class="item-price">
                        ₹${item.price}
                    </div>
                </div>

                <div class="qty">

                    <button onclick="changeQty('${item.item}',-1)">
                        −
                    </button>

                    <span id="${id}">
                        0
                    </span>

                    <button onclick="changeQty('${item.item}',1)">
                        +
                    </button>

                </div>
            `;

            menuDiv.appendChild(div);

        });

        if(menu.length === 0){

            menuDiv.innerHTML =
            `<div class="loading">
                No items available
            </div>`;
        }

    }catch(error){

        console.error(error);

        document.getElementById("menu").innerHTML =
        `<div class="loading">
            Unable to load menu
        </div>`;
    }
}

function changeQty(name,val){

    const maxQty =
    stockMap[name] || 0;

    let newQty =
    cart[name] + val;

    if(newQty < 0)
        newQty = 0;

    if(newQty > maxQty){

        alert(
            "Only " +
            maxQty +
            " available"
        );

        return;
    }

    cart[name] = newQty;

    document.getElementById(
        name.replace(/\s+/g,"_")
    ).innerText = newQty;

    calculateTotal();
}

function calculateTotal(){

    let total = 0;

    menu.forEach(item => {

        total +=
        cart[item.item] *
        Number(item.price);

    });

    document.getElementById("total").innerText =
    total;
}

async function placeOrder(){

    let hasItems = false;

    let total = 0;

    const orderItems = {};

    let whatsappMsg =
    "☕ POLAYYA TEA STALL\n\n";

    whatsappMsg +=
    "Table: " + table + "\n\n";

    menu.forEach(item => {

        const qty =
        cart[item.item];

        if(qty > 0){

            hasItems = true;

            orderItems[item.item] =
            qty;

            const lineTotal =
            qty * item.price;

            total += lineTotal;

            whatsappMsg +=
            item.item +
            " x " +
            qty +
            " = ₹" +
            lineTotal +
            "\n";
        }
    });

    if(!hasItems){

        alert(
            "Please select items"
        );

        return;
    }

    whatsappMsg +=
    "\nTotal = ₹" + total;

    try{

        const response =
        await fetch(orderURL,{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                table:table,

                items:orderItems

            })

        });

        const result =
        await response.json();

        if(!result.success){

            alert(
                result.message ||
                "Order failed"
            );

            return;
        }

        const whatsappURL =
        `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(whatsappMsg)}`;

        window.open(
            whatsappURL,
            "_blank"
        );

        location.reload();

    }catch(error){

        console.error(error);

        alert(
            "Failed to place order"
        );
    }
}

loadMenu();

</script>

</body>
</html>
