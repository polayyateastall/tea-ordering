<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Order Tea</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f8f8f8;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    text-align:center;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

.qty{
    display:flex;
    align-items:center;
}

button{
    padding:5px 12px;
    margin:0 5px;
}

#checkout{
    width:100%;
    padding:15px;
    background:green;
    color:white;
    border:none;
    margin-top:20px;
    font-size:18px;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Tea Point Menu</h2>

<h3 id="tableNo"></h3>

<div id="menu"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button id="checkout" onclick="placeOrder()">
Place Order
</button>

</div>

<script>

const menu = [
{name:"Tea", price:23},
{name:"Coffee", price:33},
{name:"Lemon Tea", price:23},
{name:"Green Tea", price:23},
{name:"Horlicks", price:29},
{name:"Boost", price:29},
{name:"Elaichi Tea", price:23},
{name:"Ginger Tea", price:23},
{name:"Sonthi Coffee", price:34}
];

const whatsappNumber = "918121944510";

const cart = {};

const params = new URLSearchParams(window.location.search);
const table = params.get("table") || "Unknown";

document.getElementById("tableNo").innerHTML =
"Table : " + table;

const menuDiv = document.getElementById("menu");

menu.forEach(item=>{

cart[item.name]=0;

const div=document.createElement("div");

div.className="item";

div.innerHTML=`
<div>
${item.name}<br>
₹${item.price}
</div>

<div class="qty">
<button onclick="changeQty('${item.name}',-1)">
-
</button>

<span id="${item.name}">
0
</span>

<button onclick="changeQty('${item.name}',1)">
+
</button>
</div>
`;

menuDiv.appendChild(div);

});

function changeQty(name,val){

cart[name]+=val;

if(cart[name]<0)
cart[name]=0;

document.getElementById(name).innerText=
cart[name];

calculateTotal();
}

function calculateTotal(){

let total=0;

menu.forEach(item=>{
total+=cart[item.name]*item.price;
});

document.getElementById("total").innerText=
total;
}

function placeOrder(){

let msg=`New Order\n\n`;
msg+=`Table: ${table}\n\n`;

let total=0;
let hasItems=false;

menu.forEach(item=>{

let qty=cart[item.name];

if(qty>0){

hasItems=true;

let lineTotal=qty*item.price;

total+=lineTotal;

msg+=`${item.name} x ${qty} = ₹${lineTotal}\n`;
}
});

if(!hasItems){
alert("Please select items");
return;
}

msg+=`\nTotal = ₹${total}`;

const url=
`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`;

window.open(url,'_blank');
}

</script>

</body>
</html>
